version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: gigflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gigflow
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/gigflow
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-super-secret}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost
    ports:
      - '5000:5000'
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigflow-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
    driver: local
