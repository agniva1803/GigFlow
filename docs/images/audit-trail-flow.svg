<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
  <title>Audit trail write flow on lead update</title>
  <desc>When a lead is updated, the controller snapshots the lead's fields before applying the change, applies the update, diffs before and after to find which fields changed, writes one activity log entry per changed field, and sends an email notification if the status changed or the lead was reassigned.</desc>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="320" fill="#ffffff"/>

  <rect x="20" y="40" width="130" height="56" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="85" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c4a6e">PUT /leads/:id</text>
  <text x="85" y="80" text-anchor="middle" font-size="11" fill="#0369a1">e.g. status change</text>

  <line x1="150" y1="68" x2="190" y2="68" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="200" y="40" width="130" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="265" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#581c87">Snapshot</text>
  <text x="265" y="80" text-anchor="middle" font-size="11" fill="#7e22ce">fields before update</text>

  <line x1="330" y1="68" x2="370" y2="68" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="380" y="40" width="130" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="445" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#581c87">Apply update</text>
  <text x="445" y="80" text-anchor="middle" font-size="11" fill="#7e22ce">findByIdAndUpdate</text>

  <line x1="510" y1="68" x2="550" y2="68" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="560" y="40" width="110" height="56" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <text x="615" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">Diff fields</text>
  <text x="615" y="80" text-anchor="middle" font-size="11" fill="#0f766e">before vs after</text>

  <line x1="615" y1="96" x2="615" y2="130" stroke="#64748b" stroke-width="1"/>
  <path d="M615 130 L 265 130 L 265 162" fill="none" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="155" y="172" width="220" height="56" rx="8" fill="#fee2d5" stroke="#ea580c" stroke-width="1"/>
  <text x="265" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c2d12">Activity.create()</text>
  <text x="265" y="212" text-anchor="middle" font-size="11" fill="#9a3412">one entry per changed field</text>

  <path d="M615 130 L 480 130 L 480 162" fill="none" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="395" y="172" width="220" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="505" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">sendEmail() — optional</text>
  <text x="505" y="212" text-anchor="middle" font-size="11" fill="#92400e">if status changed or reassigned</text>

  <line x1="265" y1="228" x2="265" y2="256" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="505" y1="228" x2="505" y2="256" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <text x="265" y="276" text-anchor="middle" font-size="11" fill="#475569">non-fatal — failure here</text>
  <text x="265" y="292" text-anchor="middle" font-size="11" fill="#475569">never breaks the request</text>

  <text x="505" y="276" text-anchor="middle" font-size="11" fill="#475569">non-fatal — logs to console</text>
  <text x="505" y="292" text-anchor="middle" font-size="11" fill="#475569">if SMTP env vars are unset</text>
</svg>
