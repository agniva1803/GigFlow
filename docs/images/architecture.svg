<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
  <title>GigFlow architecture diagram</title>
  <desc>A request flows from the React frontend on Vercel through Express middleware (helmet, CORS, rate limiting, JWT auth, RBAC) on Render, into auth and lead controllers, which read and write MongoDB Atlas, log to the activity audit trail, and optionally send email notifications via SMTP. GitHub Actions runs type checks, lint, and Jest tests on every push.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="660" fill="#ffffff"/>

  <rect x="240" y="40" width="200" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="340" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#0c4a6e">React + TypeScript</text>
  <text x="340" y="80" text-anchor="middle" font-size="12" fill="#0369a1">Vite, deployed on Vercel</text>

  <line x1="340" y1="96" x2="340" y2="128" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="352" y="116" font-size="12" fill="#475569">HTTPS / JWT bearer</text>

  <rect x="60" y="138" width="560" height="132" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="162" font-size="14" font-weight="bold" fill="#0f172a">Express API — Render</text>

  <rect x="80" y="180" width="120" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="140" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#581c87">helmet + CORS</text>
  <text x="140" y="220" text-anchor="middle" font-size="11" fill="#7e22ce">security headers</text>

  <rect x="215" y="180" width="120" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="275" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#581c87">Rate limiter</text>
  <text x="275" y="220" text-anchor="middle" font-size="11" fill="#7e22ce">per-route limits</text>

  <rect x="350" y="180" width="120" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="410" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#581c87">JWT auth</text>
  <text x="410" y="220" text-anchor="middle" font-size="11" fill="#7e22ce">verifies token</text>

  <rect x="485" y="180" width="120" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1"/>
  <text x="545" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#581c87">RBAC check</text>
  <text x="545" y="220" text-anchor="middle" font-size="11" fill="#7e22ce">role + ownership</text>

  <line x1="340" y1="270" x2="340" y2="302" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="60" y="312" width="560" height="112" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="336" font-size="14" font-weight="bold" fill="#0f172a">Controllers</text>

  <rect x="80" y="350" width="160" height="56" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <text x="160" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">Auth controller</text>
  <text x="160" y="390" text-anchor="middle" font-size="11" fill="#0f766e">register, login</text>

  <rect x="260" y="350" width="160" height="56" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <text x="340" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">Lead controller</text>
  <text x="340" y="390" text-anchor="middle" font-size="11" fill="#0f766e">CRUD, filters, CSV</text>

  <rect x="440" y="350" width="160" height="56" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <text x="520" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">Activity logger</text>
  <text x="520" y="390" text-anchor="middle" font-size="11" fill="#0f766e">audit trail writer</text>

  <line x1="160" y1="424" x2="160" y2="456" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="424" x2="340" y2="456" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="520" y1="424" x2="520" y2="456" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="80" y="466" width="280" height="56" rx="8" fill="#fee2d5" stroke="#ea580c" stroke-width="1"/>
  <text x="220" y="488" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c2d12">MongoDB Atlas</text>
  <text x="220" y="506" text-anchor="middle" font-size="11" fill="#9a3412">users, leads, activity</text>

  <rect x="400" y="466" width="200" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="500" y="488" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">SMTP (optional)</text>
  <text x="500" y="506" text-anchor="middle" font-size="11" fill="#92400e">assignment / status emails</text>

  <text x="340" y="558" text-anchor="middle" font-size="12" fill="#475569">runs on every push to main</text>
  <rect x="220" y="568" width="240" height="56" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="340" y="590" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">GitHub Actions CI</text>
  <text x="340" y="608" text-anchor="middle" font-size="11" fill="#15803d">typecheck, lint, Jest, build</text>

  <path d="M460 596 C 580 580, 615 440, 612 270" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="618" y="430" font-size="11" fill="#64748b" transform="rotate(90 618 430)">verifies before deploy</text>
</svg>
