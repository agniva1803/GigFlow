<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Funnel pipeline: three converging bars representing leads flowing & narrowing into qualified leads -->
  <g>
    <rect x="120" y="148" width="272" height="36" rx="18" fill="#ffffff" opacity="0.92"/>
    <rect x="156" y="238" width="200" height="36" rx="18" fill="#ffffff" opacity="0.96"/>
    <rect x="192" y="328" width="128" height="36" rx="18" fill="url(#bolt)"/>
  </g>

  <!-- Accent dot: the "qualified" lead landing -->
  <circle cx="256" cy="404" r="16" fill="#f97316"/>
</svg>
